# EdgeBalancer Nginx Configuration
# Reverse proxy for Node.js API server
server {
    listen 80;
    server_name apiedge.nexoral.in;

    # Client max body size (for file uploads if needed)
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/edgebalancer-access.log;
    error_log /var/log/nginx/edgebalancer-error.log;

    # Main location - proxy to Node.js server
    location / {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable caching for dynamic content
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
