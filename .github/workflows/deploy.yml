name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'config/**'

jobs:
  # Detect which files changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      config: ${{ steps.filter.outputs.config }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
            config:
              - 'config/**'

  # Job 1: Deploy Server
  deploy-server:
    name: Deploy Server to VPS
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.server == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Build server and install dependencies
        run: |
          cd server
          npm ci
          npm run build

          # Remove dev dependencies to reduce deployment size
          rm -rf node_modules

          # Install production dependencies
          echo "Installing production dependencies..."
          npm ci --only=production

      - name: Create deployment archive with node_modules
        run: |
          cd server
          echo "Creating deployment archive..."
          tar -czf ../server-deploy.tar.gz dist/ node_modules/ package.json package-lock.json

          # Show archive size
          ls -lh ../server-deploy.tar.gz

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          script: |
            # Check if PM2 is installed
            if ! command -v pm2 &> /dev/null; then
                echo "Installing PM2..."
                npm install -g pm2
            fi

            # Stop and delete existing PM2 process if running
            if pm2 list | grep -q "edgebalancer-api"; then
                echo "Stopping existing PM2 process..."
                pm2 delete edgebalancer-api || true
            fi

            # Backup old deployment
            if [ -d ~/edgebalancer ]; then
                echo "Backing up old deployment..."
                rm -rf ~/edgebalancer.backup
                mv ~/edgebalancer ~/edgebalancer.backup
            fi

            # Create fresh directory
            echo "Creating deployment directory..."
            mkdir -p ~/edgebalancer

      - name: Transfer files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          source: "server-deploy.tar.gz"
          target: "~/"

      - name: Extract and setup application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          script: |
            # Extract files (includes node_modules from CI/CD)
            echo "Extracting deployment archive..."
            cd ~/edgebalancer
            tar -xzf ~/server-deploy.tar.gz
            rm ~/server-deploy.tar.gz

            # Verify extraction
            echo "Deployment contents:"
            ls -la

            # Create .env file from GitHub Secrets
            echo "Creating .env file..."
            echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}" >> .env
            echo "PORT=${{ secrets.PORT }}" >> .env
            echo "CLIENT_URL=${{ secrets.CLIENT_URL }}" >> .env
            echo "CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}" >> .env
            echo "NODE_ENV=${{ secrets.NODE_ENV }}" >> .env
            echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env
            echo "FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}" >> .env
            echo 'FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}' >> .env

            # Start application with PM2
            echo "Starting application with PM2..."
            pm2 start dist/index.js --name edgebalancer-api
            pm2 save

            # Setup PM2 startup script (only runs if not already configured)
            pm2 startup | tail -n 1 | bash || true

            # Show status
            pm2 list
            echo "Server deployment completed successfully!"

  # Job 2: Deploy Nginx Configuration
  deploy-nginx:
    name: Deploy Nginx Config to VPS
    runs-on: ubuntu-latest
    needs: [changes, deploy-server]
    if: |
      always() &&
      needs.changes.outputs.config == 'true' &&
      (needs.deploy-server.result == 'success' || needs.deploy-server.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Transfer nginx config to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          source: "config/edgebalancer.conf"
          target: "~/nginx-temp/"
          strip_components: 1

      - name: Deploy nginx configuration
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          script: |
            export PATH="$PATH:/usr/sbin"

            if ! command -v nginx &> /dev/null; then
                echo "nginx not found, installing..."
                export DEBIAN_FRONTEND=noninteractive
                sudo apt-get update -qq
                sudo apt-get install -y nginx
                sudo systemctl enable nginx
                sudo systemctl start nginx
                echo "nginx installed and started"
            fi

            sudo mkdir -p /etc/nginx/conf.d

            echo "Deploying nginx configuration..."
            sudo cp ~/nginx-temp/edgebalancer.conf /etc/nginx/conf.d/edgebalancer.conf

            echo "Validating nginx configuration..."
            sudo nginx -t

            echo "Reloading nginx..."
            sudo systemctl reload nginx

            rm -rf ~/nginx-temp
            echo "Nginx configuration deployed successfully!"

      - name: Obtain SSL Certificate with Certbot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          script: |
            if ! command -v certbot &> /dev/null; then
                echo "certbot not found, installing..."
                export DEBIAN_FRONTEND=noninteractive
                sudo apt-get update -qq
                sudo apt-get install -y certbot python3-certbot-nginx
                echo "certbot installed"
            fi

            # Extract domain from nginx config
            DOMAIN=$(grep -oP 'server_name\s+\K[^;]+' /etc/nginx/conf.d/edgebalancer.conf | tr -d ' ')
            echo "Domain from config: $DOMAIN"

            # Check if certificate already exists
            if sudo certbot certificates 2>/dev/null | grep -q "Certificate Name: $DOMAIN"; then
                echo "✓ SSL certificate already exists for $DOMAIN — auto-renews at 30 days before expiry"
            else
                echo "No SSL certificate found for $DOMAIN"
                echo "Obtaining SSL certificate from Let's Encrypt..."

                # Obtain certificate using nginx plugin (automatic config)
                sudo certbot --nginx -d "$DOMAIN" --non-interactive --agree-tos --email ${{ vars.LETSENCRYPT_EMAIL }} --redirect

                if [ $? -eq 0 ]; then
                    echo "✓ SSL certificate obtained successfully!"
                    echo "Certificate will auto-renew via systemd timer"
                    echo ""
                    echo "Your site is now accessible at:"
                    echo "  https://$DOMAIN"
                else
                    echo "✗ Failed to obtain SSL certificate"
                    echo "Common issues:"
                    echo "  - DNS not pointing to this server"
                    echo "  - Port 80/443 blocked by firewall"
                    echo "  - Domain not resolving correctly"
                    echo ""
                    echo "You can manually obtain certificate later:"
                    echo "  sudo certbot --nginx -d $DOMAIN"
                    exit 1
                fi
            fi

            # Show certificate status
            echo ""
            echo "Certificate Status:"
            sudo certbot certificates
