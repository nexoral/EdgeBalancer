name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'client/**'
      - 'config/**'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1 — Detect which paths changed
  # ─────────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
      config: ${{ steps.filter.outputs.config }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
            client:
              - 'client/**'
            config:
              - 'config/**'

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2 — Tests (client-test and server-test run in PARALLEL)
  # ─────────────────────────────────────────────────────────────────────────────
  client-test:
    name: Client — Build + Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.client == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Run tests
        run: cd client && npm test

  server-test:
    name: Server — Build + Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.server == 'true'
    env:
      JWT_SECRET: test-jwt-secret-for-ci-do-not-use-in-production
      ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      NODE_ENV: test
      PORT: "0"
      CLIENT_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      # MONGODB_URI is provided at runtime by mongodb-memory-server in globalSetup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Build server
        run: cd server && npm run build

      - name: Run tests
        run: cd server && npm test

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3 — Deploys (deploy-server and deploy-nginx run in PARALLEL)
  #           Both wait for all tests to finish, but neither waits for the other.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-server:
    name: Deploy Server to VPS
    runs-on: ubuntu-latest
    needs: [changes, server-test]
    if: |
      needs.changes.outputs.server == 'true' &&
      needs.server-test.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Build server and install production dependencies
        run: |
          cd server
          npm ci
          npm run build

          # Swap to production-only node_modules to reduce archive size
          rm -rf node_modules
          npm ci --only=production

      - name: Create deployment archive
        run: |
          cd server
          tar -czf ../server-deploy.tar.gz dist/ node_modules/ package.json package-lock.json
          ls -lh ../server-deploy.tar.gz

      - name: Get server version
        id: version
        run: echo "version=$(node -p "require('./server/package.json').version")" >> $GITHUB_OUTPUT

      - name: Transfer archive to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          source: "server-deploy.tar.gz"
          target: "~/"

      - name: Extract, configure, and restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          script: |
            VERSION="${{ steps.version.outputs.version }}"
            DEPLOY_DIR="$HOME/edgebalancer-$VERSION"

            if ! command -v pm2 &> /dev/null; then
                npm install -g pm2
            fi

            # --- old server still running during all of this ---

            rm -rf "$DEPLOY_DIR"
            mkdir -p "$DEPLOY_DIR"

            echo "Extracting v$VERSION..."
            tar -xzf ~/server-deploy.tar.gz -C "$DEPLOY_DIR"
            rm ~/server-deploy.tar.gz

            echo "Writing .env..."
            echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > "$DEPLOY_DIR/.env"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> "$DEPLOY_DIR/.env"
            echo "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}" >> "$DEPLOY_DIR/.env"
            echo "PORT=${{ secrets.PORT }}" >> "$DEPLOY_DIR/.env"
            echo "CLIENT_URL=${{ secrets.CLIENT_URL }}" >> "$DEPLOY_DIR/.env"
            echo "CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}" >> "$DEPLOY_DIR/.env"
            echo "NODE_ENV=${{ secrets.NODE_ENV }}" >> "$DEPLOY_DIR/.env"
            echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> "$DEPLOY_DIR/.env"
            echo "FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}" >> "$DEPLOY_DIR/.env"
            echo 'FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}' >> "$DEPLOY_DIR/.env"

            # --- downtime window starts here ---

            cd "$DEPLOY_DIR"
            if pm2 list | grep -q "edgebalancer-api"; then
                pm2 delete edgebalancer-api
            fi

            pm2 start dist/index.js --name edgebalancer-api --cwd "$DEPLOY_DIR" --update-env
            pm2 save

            # --- downtime window ends here ---

            find "$HOME" -maxdepth 1 -type d -name 'edgebalancer-*' ! -name "edgebalancer-$VERSION" -exec rm -rf {} +
            rm -rf "$HOME/edgebalancer" "$HOME/edgebalancer.backup"

            pm2 list
            echo "Deployed v$VERSION successfully!"

  deploy-nginx:
    name: Deploy Nginx Config to VPS
    runs-on: ubuntu-latest
    needs: [changes, server-test]
    if: |
      always() &&
      needs.changes.outputs.config == 'true' &&
      (needs.server-test.result == 'success' || needs.server-test.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Transfer nginx config to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          source: "config/edgebalancer.conf"
          target: "~/nginx-temp/"
          strip_components: 1

      - name: Deploy nginx configuration
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          script: |
            export PATH="$PATH:/usr/sbin"

            if ! command -v nginx &> /dev/null; then
                echo "nginx not found, installing..."
                export DEBIAN_FRONTEND=noninteractive
                sudo apt-get update -qq
                sudo apt-get install -y nginx
                sudo systemctl enable nginx
                sudo systemctl start nginx
                echo "nginx installed and started"
            fi

            sudo mkdir -p /etc/nginx/conf.d

            echo "Deploying nginx configuration..."
            sudo cp ~/nginx-temp/edgebalancer.conf /etc/nginx/conf.d/edgebalancer.conf

            echo "Validating nginx configuration..."
            sudo nginx -t

            echo "Reloading nginx..."
            sudo systemctl reload nginx

            rm -rf ~/nginx-temp
            echo "Nginx configuration deployed successfully!"

      - name: Obtain SSL Certificate with Certbot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          script: |
            if ! command -v certbot &> /dev/null; then
                echo "certbot not found, installing..."
                export DEBIAN_FRONTEND=noninteractive
                sudo apt-get update -qq
                sudo apt-get install -y certbot python3-certbot-nginx
                echo "certbot installed"
            fi

            DOMAIN=$(grep -oP 'server_name\s+\K[^;]+' /etc/nginx/conf.d/edgebalancer.conf | tr -d ' ')
            echo "Domain from config: $DOMAIN"

            if sudo certbot certificates 2>/dev/null | grep -q "Certificate Name: $DOMAIN"; then
                echo "✓ SSL certificate already exists for $DOMAIN — auto-renews at 30 days before expiry"
            else
                echo "No SSL certificate found for $DOMAIN"
                echo "Obtaining SSL certificate from Let's Encrypt..."

                sudo certbot --nginx -d "$DOMAIN" --non-interactive --agree-tos --email ${{ vars.LETSENCRYPT_EMAIL }} --redirect

                if [ $? -eq 0 ]; then
                    echo "✓ SSL certificate obtained successfully!"
                    echo "Certificate will auto-renew via systemd timer"
                    echo "Your site is now accessible at: https://$DOMAIN"
                else
                    echo "✗ Failed to obtain SSL certificate"
                    echo "Common issues: DNS not pointing to this server, port 80/443 blocked, domain not resolving"
                    echo "Run manually: sudo certbot --nginx -d $DOMAIN"
                    exit 1
                fi
            fi

            echo ""
            echo "Certificate Status:"
            sudo certbot certificates
