name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'client/**'
      - 'k8s/**'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1 — Detect which paths changed
  # ─────────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
            client:
              - 'client/**'
            k8s:
              - 'k8s/**'

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2 — Builds (client-build and server-build run in PARALLEL)
  # ─────────────────────────────────────────────────────────────────────────────
  client-build:
    name: Client — Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.client == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build

  server-build:
    name: Server — Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.server == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Build server
        run: cd server && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: server/dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3 — Tests (client-test and server-test run in PARALLEL)
  # ─────────────────────────────────────────────────────────────────────────────
  client-test:
    name: Client — Test
    runs-on: ubuntu-latest
    needs: [changes, client-build]
    if: needs.client-build.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Run tests
        run: cd client && npm test

      - name: Annotate summary
        run: |
          echo "## Client — Build & Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check  | Status  |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build  | passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests  | passed |" >> $GITHUB_STEP_SUMMARY

  server-test:
    name: Server — Test
    runs-on: ubuntu-latest
    needs: [changes, server-build]
    if: needs.server-build.result == 'success'
    env:
      JWT_SECRET: test-jwt-secret-for-ci-do-not-use-in-production
      ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      NODE_ENV: test
      PORT: "0"
      CLIENT_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      # MONGODB_URI is provided at runtime by mongodb-memory-server in globalSetup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: server-dist
          path: server/dist/

      - name: Run tests
        run: cd server && npm test

      - name: Annotate summary
        run: |
          echo "## Server — Build & Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check  | Status  |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build  | passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests  | passed |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 4 — Build Docker image and push to GHCR
  # ─────────────────────────────────────────────────────────────────────────────
  build-push-server:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [changes, server-test]
    if: |
      needs.changes.outputs.server == 'true' &&
      needs.server-test.result == 'success'
    outputs:
      image: ${{ steps.image-tag.outputs.image }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get server version
        id: version
        run: echo "version=$(node -p "require('./server/package.json').version")" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag output
        id: image-tag
        run: echo "image=ghcr.io/${{ github.repository_owner }}/edgebalancer-server:${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/edgebalancer-server:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/edgebalancer-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Delete old GHCR versions (keep current + 2 previous)
        uses: actions/delete-package-versions@v5
        with:
          package-name: edgebalancer-server
          package-type: container
          min-versions-to-keep: 3
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Annotate summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## Docker Image — Built & Pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail   | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version  | \`v$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image    | \`ghcr.io/${{ github.repository_owner }}/edgebalancer-server:$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA Tag  | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | linux/arm64 (Graviton) |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | GHCR |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 5a — Apply k8s config (ONLY when k8s/** changes)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-k3s-config:
    name: Apply k8s Config
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.k8s == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy k8s manifests to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          source: "k8s"
          target: "~/k8s-deploy/"

      - name: Apply manifests
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          script: |
            sudo k3s kubectl create namespace edgebalancer --dry-run=client -o yaml | sudo k3s kubectl apply -f -
            sudo k3s kubectl apply -f ~/k8s-deploy/k8s/
            rm -rf ~/k8s-deploy
            echo "k8s config applied successfully!"

      - name: Annotate summary
        run: |
          echo "## k8s Config Applied" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail   | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Manifests | Deployment, Service, Ingress |" >> $GITHUB_STEP_SUMMARY
          echo "| Host     | \`${{ vars.SERVER_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status   | applied |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 5b — Rolling image update (ONLY when server/** changes)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-k3s-image:
    name: Rolling Update Image
    runs-on: ubuntu-latest
    needs: [changes, build-push-server]
    if: |
      needs.changes.outputs.server == 'true' &&
      needs.build-push-server.result == 'success'
    steps:
      - name: Update image and env secrets
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          script: |
            IMAGE="${{ needs.build-push-server.outputs.image }}"

            sudo k3s kubectl create namespace edgebalancer --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            echo "Upserting GHCR pull secret..."
            sudo k3s kubectl create secret docker-registry ghcr-pull-secret \
              --namespace edgebalancer \
              --docker-server=ghcr.io \
              --docker-username=${{ github.repository_owner }} \
              --docker-password=${{ secrets.GHCR_TOKEN }} \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            echo "Upserting app env secret..."
            sudo k3s kubectl create secret generic edgebalancer-env \
              --namespace edgebalancer \
              --from-literal=MONGODB_URI="${{ secrets.MONGODB_URI }}" \
              --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              --from-literal=ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}" \
              --from-literal=CLIENT_URL="${{ secrets.CLIENT_URL }}" \
              --from-literal=CORS_ORIGIN="${{ secrets.CORS_ORIGIN }}" \
              --from-literal=FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}" \
              --from-literal=FIREBASE_CLIENT_EMAIL="${{ secrets.FIREBASE_CLIENT_EMAIL }}" \
              --from-literal=FIREBASE_PRIVATE_KEY="${{ secrets.FIREBASE_PRIVATE_KEY }}" \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            echo "Rolling update to: $IMAGE"
            sudo k3s kubectl set image deployment/edgebalancer-server \
              edgebalancer-server=$IMAGE \
              --namespace edgebalancer

            echo "Waiting for rollout..."
            sudo k3s kubectl rollout status deployment/edgebalancer-server \
              --namespace edgebalancer --timeout=5m

            echo "Deployed $IMAGE successfully!"

      - name: Annotate summary
        run: |
          VERSION="${{ needs.build-push-server.outputs.version }}"
          IMAGE="${{ needs.build-push-server.outputs.image }}"
          echo "## Deployed to k3s" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail    | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version   | \`v$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image     | \`$IMAGE\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Host      | \`${{ vars.SERVER_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Strategy  | Rolling Update (maxSurge=1, maxUnavailable=0) |" >> $GITHUB_STEP_SUMMARY
          echo "| Replicas  | 2 fixed (500m CPU / 512Mi RAM each) |" >> $GITHUB_STEP_SUMMARY
          echo "| Status    | deployed |" >> $GITHUB_STEP_SUMMARY
