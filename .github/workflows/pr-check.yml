name: PR Check and Auto-Merge

# Runs on ALL pull requests to any branch.
# Flow: client (build → test) → server (build → test) → auto-merge + delete branch

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write        # needed to merge and delete the branch
  pull-requests: write   # needed to approve / merge the PR via gh cli

jobs:
  # ─── Step 1: Client Build + Tests ───────────────────────────────────────────
  client-test:
    name: Client Build + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Run client tests
        run: cd client && npm test

  # ─── Step 2: Server Build + Tests (runs only after client job passes) ─────────
  server-test:
    name: Server Build + Tests
    runs-on: ubuntu-latest
    needs: client-test
    env:
      JWT_SECRET: test-jwt-secret-for-ci-do-not-use-in-production
      ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      NODE_ENV: test
      PORT: "0"
      CLIENT_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      # MONGODB_URI is set at runtime by mongodb-memory-server in globalSetup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Build server
        run: cd server && npm run build

      - name: Run server tests
        run: cd server && npm test

  # ─── Step 3: Auto-Merge and Delete Branch (only when both test jobs succeed) ─
  auto-merge:
    name: Auto-Merge PR and Delete Branch
    runs-on: ubuntu-latest
    needs: [client-test, server-test]
    if: success()

    steps:
      - name: Merge PR and delete source branch
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --delete-branch \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
