name: PR Check and Auto-Merge

# Flow: detect changes → [client-test ‖ server-test] parallel → auto-merge
# If no changes in a area → that test is skipped, merge still proceeds.
# If zero changes total → all tests skipped, PR merges immediately.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1 — Detect which paths changed
  # ─────────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2 — Tests run in PARALLEL, each skipped if no relevant files changed
  # ─────────────────────────────────────────────────────────────────────────────
  client-test:
    name: Client — Build + Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.client == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Run client tests
        run: cd client && npm test

  server-test:
    name: Server — Build + Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.server == 'true'
    env:
      JWT_SECRET: test-jwt-secret-for-ci-do-not-use-in-production
      ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      NODE_ENV: test
      PORT: "0"
      CLIENT_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      # MONGODB_URI is provided at runtime by mongodb-memory-server in globalSetup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Build server
        run: cd server && npm run build

      - name: Run server tests
        run: cd server && npm test

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3 — Merge only when all applicable tests pass (or were skipped)
  # ─────────────────────────────────────────────────────────────────────────────
  auto-merge:
    name: Auto-Merge PR and Delete Branch
    runs-on: ubuntu-latest
    needs: [changes, client-test, server-test]
    if: |
      always() &&
      (needs.client-test.result == 'success' || needs.client-test.result == 'skipped') &&
      (needs.server-test.result == 'success' || needs.server-test.result == 'skipped')
    steps:
      - name: Merge PR and delete source branch
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --delete-branch \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
